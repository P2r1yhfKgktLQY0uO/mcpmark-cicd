name: Deployment Status Workflow

on:
  push:
    branches: [ main ]

jobs:
  pre-deployment:
    name: pre-deployment
    runs-on: ubuntu-latest
    outputs:
      issue-number: ${{ steps.create-issue.outputs.issue-number }}
      previous-sha: ${{ steps.get-commits.outputs.previous-sha }}
      current-sha: ${{ steps.get-commits.outputs.current-sha }}
      package-version: ${{ steps.get-version.outputs.package-version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Get last 2 commits to get previous SHA

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run lint checks
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Get commit SHAs
        id: get-commits
        run: |
          echo "previous-sha=$(git rev-parse HEAD^)" >> $GITHUB_OUTPUT
          echo "current-sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Get package version
        id: get-version
        run: |
          echo "package-version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Create deployment tracking issue
        id: create-issue
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Tracking - ${{ steps.get-commits.outputs.current-sha }}`,
              body: `# Deployment Tracking for ${{ steps.get-commits.outputs.current-sha }}
              
              ## Pre-Deployment Information
              - Previous Commit: ${{ steps.get-commits.outputs.previous-sha }}
              - Current Commit: ${{ steps.get-commits.outputs.current-sha }}
              - Package Version: ${{ steps.get-version.outputs.package-version }}`,
              labels: ["deployment", "in-progress"]
            });
            return issue.number;
          result-encoding: string

      - name: Post pre-deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.create-issue.outputs.issue-number }},
              body: "Pre-deployment checks completed"
            });

  rollback-preparation:
    name: rollback-preparation
    runs-on: ubuntu-latest
    needs: pre-deployment
    outputs:
      artifact-name: ${{ steps.create-artifact.outputs.artifact-name }}
      checksum: ${{ steps.generate-checksum.outputs.checksum }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create rollback script
        run: |
          cat > rollback.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          echo "Starting rollback process..."

          # Verify current commit
          CURRENT_COMMIT=$(git rev-parse HEAD)
          echo "Current commit: $CURRENT_COMMIT"

          # Rollback to previous commit
          echo "Rolling back to ${{ needs.pre-deployment.outputs.previous-sha }}..."
          git checkout ${{ needs.pre-deployment.outputs.previous-sha }}

          # Reinstall dependencies
          echo "Reinstalling dependencies..."
          npm ci

          # Verify installation
          echo "Verifying dependencies..."
          npm run verify || { echo "Dependency verification failed"; exit 1; }

          echo "Rollback completed successfully!"
          EOF
          chmod +x rollback.sh

      - name: Create dependency verification script
        run: |
          cat > verify-deps.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          echo "Verifying dependency compatibility..."
          npm ls --production || { echo "Dependency tree has issues"; exit 1; }
          echo "Dependency verification passed!"
          EOF
          chmod +x verify-deps.sh

      - name: Create rollback documentation
        run: |
          cat > ROLLBACK_GUIDE.md << 'EOF'
          # Rollback Guide for Deployment ${{ needs.pre-deployment.outputs.current-sha }}

          ## Prerequisites
          - Git installed
          - Node.js 20 installed
          - Access to the repository

          ## Step-by-Step Rollback
          1. Clone the repository if not already done: `git clone https://github.com/${{ github.repository }}.git`
          2. Navigate to the repository directory: `cd ${{ github.event.repository.name }}`
          3. Run the rollback script: `./rollback.sh`
          4. Verify the rollback: `./verify-deps.sh`
          5. Restart the application: `npm start`

          ## Emergency Rollback
          If the main script fails:
          1. Manually checkout the previous commit: `git checkout ${{ needs.pre-deployment.outputs.previous-sha }}`
          2. Reinstall dependencies: `npm ci`
          3. Verify and restart the application
          EOF

      - name: Create configuration backup
        run: |
          mkdir -p rollback-backups
          cp package.json rollback-backups/
          cp package-lock.json rollback-backups/
          if [ -f .env.example ]; then cp .env.example rollback-backups/; fi

      - name: Create rollback package
        id: create-artifact
        run: |
          ARTIFACT_NAME="rollback-package-${{ needs.pre-deployment.outputs.current-sha }}"
          mkdir -p $ARTIFACT_NAME
          cp rollback.sh $ARTIFACT_NAME/
          cp verify-deps.sh $ARTIFACT_NAME/
          cp ROLLBACK_GUIDE.md $ARTIFACT_NAME/
          cp -r rollback-backups $ARTIFACT_NAME/
          zip -r $ARTIFACT_NAME.zip $ARTIFACT_NAME/
          echo "artifact-name=$ARTIFACT_NAME.zip" >> $GITHUB_OUTPUT

      - name: Generate SHA256 checksum
        id: generate-checksum
        run: |
          CHECKSUM=$(sha256sum ${{ steps.create-artifact.outputs.artifact-name }} | awk '{print $1}')
          echo "checksum=$CHECKSUM" >> $GITHUB_OUTPUT

      - name: Upload rollback artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.create-artifact.outputs.artifact-name }}
          path: ${{ steps.create-artifact.outputs.artifact-name }}
          retention-days: 30

      - name: Post rollback plan comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              body: `# 🔄 Rollback Plan Ready

              ## Deployment Details
              - Previous Commit: ${{ needs.pre-deployment.outputs.previous-sha }}
              - Current Commit: ${{ needs.pre-deployment.outputs.current-sha }}
              - Package Version: ${{ needs.pre-deployment.outputs.package-version }}
              - Artifact: ${{ steps.create-artifact.outputs.artifact-name }}
              - SHA256: ${{ steps.generate-checksum.outputs.checksum }}

              ## Completed Rollback Components
              ✅ Executable rollback script with error handling
              ✅ Configuration backups (package.json, package-lock.json)
              ✅ Dependency verification script
              ✅ Detailed rollback documentation
              ✅ Compressed rollback package with checksum

              ## Quick Rollback Command
              \`\`\`bash
              # Download the rollback artifact and extract
              unzip ${{ steps.create-artifact.outputs.artifact-name }}
              cd ${ARTIFACT_NAME}
              ./rollback.sh
              \`\`\`

              ## Verification Status
              - Rollback script created: true
              - Configuration backup: true
              `
            });

  post-deployment:
    name: post-deployment
    runs-on: ubuntu-latest
    needs: rollback-preparation
    steps:
      - name: Update issue labels
        uses: actions/github-script@v7
        with:
          script: |
            // Remove in-progress label
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              name: "in-progress"
            });

            // Add completed label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              labels: ["completed"]
            });

      - name: Post final deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              body: `# Deployment Completed Successfully

              ## Rollback Artifact Details
              - Artifact Name: ${{ needs.rollback-preparation.outputs.artifact-name }}
              - SHA256 Checksum: ${{ needs.rollback-preparation.outputs.checksum }}
              - Retention Period: 30 days

              The deployment has been completed successfully. The rollback package is available as an artifact from this workflow run if needed.
              `
            });

      - name: Close deployment issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue-number }},
              state: "closed"
            });
